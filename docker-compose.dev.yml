services:
  postgres:
    image: postgres:16
    container_name: ordowiki-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: ordowiki
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: ordowiki
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ordowiki -d ordowiki"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
